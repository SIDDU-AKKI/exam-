<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catalog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Product Catalog</h2>

  <div class="row">

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h5>Mobile</h5>
        <button class="btn btn-primary" onclick="addToCart('Mobile')">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h5>Laptop</h5>
        <button class="btn btn-primary" onclick="addToCart('Laptop')">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 text-center">
        <h5>Tablet</h5>
        <button class="btn btn-primary" onclick="addToCart('Tablet')">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-4 mt-3">
      <div class="card p-3 text-center">
        <h5>Headphones</h5>
        <button class="btn btn-primary" onclick="addToCart('Headphones')">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-4 mt-3">
      <div class="card p-3 text-center">
        <h5>Smart Watch</h5>
        <button class="btn btn-primary" onclick="addToCart('Smart Watch')">Add to Cart</button>
      </div>
    </div>

    <div class="col-md-4 mt-3">
      <div class="card p-3 text-center">
        <h5>Snacks</h5>
        <button class="btn btn-primary" onclick="addToCart('Snacks')">Add to Cart</button>
      </div>
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="cart.html" class="btn btn-dark">Go to Cart</a>
    <button onclick="logout()" class="btn btn-danger">Logout</button>
  </div>
</div>

<script>
function addToCart(item) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(item + " added to cart");
}

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}
</script>

</body>
</html>
