<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Your Cart</h2>

  <ul id="cartItems" class="list-group mb-3"></ul>

  <div class="text-center">
    <button onclick="clearCart()" class="btn btn-danger">Clear Cart</button>
    <a href="catalog.html" class="btn btn-secondary">Back to Catalog</a>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let list = document.getElementById("cartItems");

if(cart.length === 0) {
  list.innerHTML = "<li class='list-group-item'>Cart is empty</li>";
} else {
  cart.forEach(item => {
    let li = document.createElement("li");
    li.className = "list-group-item";
    li.textContent = item;
    list.appendChild(li);
  });
}

function clearCart() {
  localStorage.removeItem("cart");
  location.reload();
}
</script>

</body>
</html>
